# The keyboard integration test installs *global* low-level hooks and injects
# input via SendInput; two such tests must never run concurrently (they share the
# system input queue). nextest runs each test in its own process, so the
# in-process lock in `test_support` can't serialize them — pin that binary's tests
# to a single thread here as well.
[test-groups]
serial-input-hooks = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'binary(keyboard_e2e) | binary(mouse_e2e)'
test-group = 'serial-input-hooks'
