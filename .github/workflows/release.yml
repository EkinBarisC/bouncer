name: Release

# Tagging is the human "publish" decision. Pushing a tag like `v1.0.0` builds the
# portable exe, generates checksums, and stages a *draft* GitHub Release; a maintainer
# reviews and clicks publish.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        # `.cargo/config.toml` statically links the CRT, so this is a single
        # self-contained portable exe (no VC++ Redistributable needed).
        run: cargo build --release

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $hash = (Get-FileHash target/release/bouncer.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  bouncer.exe" | Out-File -Encoding ascii SHA256SUMS
          Get-Content SHA256SUMS

      - name: Stage draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          target/release/bouncer.exe SHA256SUMS
          --draft
          --title "${{ github.ref_name }}"
          --generate-notes
