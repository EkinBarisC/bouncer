# cargo-deny configuration. Run with `cargo deny check`.
# CI installs cargo-deny; locally `cargo install cargo-deny`.

# Bouncer is Windows-only for v1 (DESIGN.md D1), so only audit the dependency tree
# that actually ships. This excludes eframe's cross-platform leaves (x11, wayland,
# objc, …) that are never compiled into the product.
[graph]
targets = ["x86_64-pc-windows-msvc"]

[advisories]
version = 2
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
version = 2
# Bouncer ships under MIT OR Apache-2.0; allow the usual permissive set for deps.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
